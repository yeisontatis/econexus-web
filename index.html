<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoNexus | IA News Search</title>
    <style>
        :root {
            --bg-dark: #030305;
            --bg-card: #0a0a12;
            --text-main: #e0e0e0;
            --primary-neon: #00f2fe;
            --secondary-neon: #4facfe;
            --paypal-gold: #ffc439;
            --ai-glow: rgba(0, 242, 254, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-main); line-height: 1.6; }

        header { 
            background: rgba(3, 3, 5, 0.9); 
            padding: 0.8rem 5%; 
            position: fixed; 
            width: 100%; 
            top: 0; 
            z-index: 1000; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            backdrop-filter: blur(20px); 
            border-bottom: 1px solid rgba(0,242,254,0.15); 
        }

        .logo { font-size: 1.4rem; font-weight: 900; color: var(--primary-neon); text-shadow: 0 0 10px var(--primary-neon); }

        main { max-width: 1200px; margin: 0 auto; padding: 120px 20px 60px; }

        /* BUSCADOR */
        .search-container {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
            gap: 10px;
        }

        #search-input {
            width: 100%;
            max-width: 400px;
            padding: 12px 20px;
            border-radius: 50px;
            border: 1px solid var(--primary-neon);
            background: rgba(255,255,255,0.05);
            color: #fff;
            outline: none;
        }

        #search-btn {
            padding: 12px 25px;
            border-radius: 50px;
            border: none;
            background: var(--primary-neon);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        #search-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--primary-neon); }

        /* GRID Y CARDS */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }

        .card { 
            background: var(--bg-card); border-radius: 20px; border: 1px solid rgba(255,255,255,0.03); 
            overflow: hidden; display: flex; flex-direction: column; height: 100%; transition: 0.4s;
        }

        .card:hover { transform: translateY(-10px); border-color: var(--primary-neon); box-shadow: 0 10px 30px var(--ai-glow); }

        .news-img { width: 100%; height: 200px; object-fit: cover; }

        .card-content { padding: 1.5rem; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }

        .ia-tag { font-size: 0.7rem; color: var(--primary-neon); text-transform: uppercase; font-weight: bold; margin-bottom: 10px; }

        .btn-view { 
            display: block; padding: 12px; border-radius: 10px; text-align: center; text-decoration: none;
            border: 1px solid var(--primary-neon); color: var(--primary-neon); font-weight: 700; transition: 0.3s; margin-top: 15px;
        }

        .btn-view:hover { background: var(--primary-neon); color: #000; }

        footer { text-align: center; padding: 40px; color: #555; border-top: 1px solid #111; margin-top: 40px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">ECONEXUS</div>
        <a href="https://www.paypal.com/paypalme/yeisontatis" target="_blank" style="text-decoration:none; color:var(--paypal-gold); font-weight:800; font-size:0.8rem;">APOYAR</a>
    </header>

    <main>
        <div style="text-align: center; margin-bottom: 30px;">
            <h1 style="font-size: 2.5rem; margin-bottom: 10px;">Eco-Search Engine</h1>
            <p style="color: #888;">Explora noticias globales con análisis de IA</p>
        </div>

        <div class="search-container">
            <input type="text" id="search-input" placeholder="Ej: Energía Solar, IA, Robótica...">
            <button id="search-btn">BUSCAR</button>
        </div>
        
        <div id="news-container" class="grid"></div>
    </main>

    <footer>&copy; 2026 EcoNexus - Sistema de Monitoreo Dinámico</footer>

    <script>
        const API_KEY = 'b2b4310690724f4c9b2e9990ecc1b4f4'; 
        const container = document.getElementById('news-container');
        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');

        async function buscarNoticias(query = 'tecnologia sostenibilidad') {
            container.innerHTML = "<p style='grid-column: 1/-1; text-align:center;'>Consultando base de datos...</p>";
            
            try {
                const url = `https://gnews.io/api/v4/search?q=${encodeURIComponent(query)}&lang=es&max=9&apikey=${API_KEY}`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.articles && data.articles.length > 0) {
                    container.innerHTML = data.articles.map(art => `
                        <article class="card">
                            <img src="${art.image || 'https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=800'}" class="news-img">
                            <div class="card-content">
                                <div>
                                    <span class="ia-tag">Relevancia IA: 95%</span>
                                    <h3 style="color:#fff; font-size:1rem; margin-bottom:10px;">${art.title}</h3>
                                </div>
                                <a href="${art.url}" target="_blank" class="btn-view">LEER EN FUENTE</a>
                            </div>
                        </article>
                    `).join('');
                } else {
                    container.innerHTML = "<p style='grid-column: 1/-1; text-align:center;'>No se encontraron resultados.</p>";
                }
            } catch (error) {
                container.innerHTML = "<p style='grid-column: 1/-1; text-align:center;'>Error al conectar con la API.</p>";
            }
        }

        searchBtn.addEventListener('click', () => {
            if(searchInput.value.trim() !== "") {
                buscarNoticias(searchInput.value);
            }
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && searchInput.value.trim() !== "") {
                buscarNoticias(searchInput.value);
            }
        });

        // Carga inicial
        window.onload = () => buscarNoticias();
    </script>
</body>
</html>
