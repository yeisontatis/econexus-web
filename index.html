<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoNexus | IA & Global News</title>
    <style>
        :root {
            --bg-dark: #030305;
            --bg-card: #0a0a12;
            --text-main: #e0e0e0;
            --primary-neon: #00f2fe;
            --secondary-neon: #4facfe;
            --paypal-gold: #ffc439;
            --ai-glow: rgba(0, 242, 254, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* HEADER */
        header { 
            background: rgba(3, 3, 5, 0.9); 
            padding: 0.8rem 5%; 
            position: fixed; 
            width: 100%; 
            top: 0; 
            z-index: 1000; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            backdrop-filter: blur(20px); 
            border-bottom: 1px solid rgba(0,242,254,0.15); 
        }

        .logo { 
            font-size: 1.4rem; 
            font-weight: 900; 
            color: var(--primary-neon); 
            text-shadow: 0 0 10px var(--primary-neon);
            letter-spacing: 1px;
        }

        .btn-donate {
            background: var(--paypal-gold);
            color: #111;
            padding: 8px 18px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        /* MAIN CONTENT */
        main { 
            max-width: 1200px;
            margin: 0 auto;
            padding: 120px 20px 60px; 
        }

        .hero {
            text-align: center;
            margin-bottom: 50px;
        }

        .hero h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            margin-bottom: 15px;
            background: linear-gradient(to right, #fff, var(--primary-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* GRID RESPONSIVO */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 25px; 
        }

        /* TARJETAS */
        .card { 
            background: var(--bg-card); 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.03); 
            transition: all 0.4s ease;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .card:hover { 
            transform: translateY(-10px); 
            border-color: var(--primary-neon);
            box-shadow: 0 10px 30px var(--ai-glow);
        }

        .news-img { 
            width: 100%; 
            height: 200px; 
            object-fit: cover; 
            background: #1a1a2e;
        }

        .card-content {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .ia-tag {
            font-size: 0.7rem;
            color: var(--primary-neon);
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: block;
        }

        h3 { font-size: 1.1rem; margin-bottom: 15px; color: #fff; line-height: 1.4; }

        .btn-view { 
            display: block; 
            padding: 12px; 
            border-radius: 10px; 
            font-weight: 700; 
            font-size: 0.85rem;
            text-align: center;
            text-decoration: none;
            border: 1px solid var(--primary-neon);
            color: var(--primary-neon);
            transition: 0.3s;
            margin-top: 15px;
        }

        .btn-view:hover { 
            background: var(--primary-neon); 
            color: #000; 
        }

        footer { 
            text-align: center; 
            padding: 40px; 
            color: #555; 
            border-top: 1px solid #111; 
            font-size: 0.8rem;
        }

        /* ESTADO CARGANDO */
        #status-msg {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: var(--primary-neon);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">ECONEXUS</div>
        <a href="https://www.paypal.com/paypalme/yeisontatis" target="_blank" class="btn-donate">APOYAR PROYECTO</a>
    </header>

    <main>
        <div class="hero">
            <h1>Global Eco-Monitor</h1>
            <p>Inteligencia Artificial aplicada al desarrollo sostenible</p>
        </div>
        
        <div id="news-container" class="grid">
            <div id="status-msg">Iniciando protocolo de enlace...</div>
        </div>
    </main>

    <footer>&copy; 2026 EcoNexus - Sistema Global de Monitoreo Estático</footer>

    <script>
        const API_KEY = 'b2b4310690724f4c9b2e9990ecc1b4f4'; 
        const container = document.getElementById('news-container');

        async function cargarNoticias() {
            try {
                // Intento de conexión con la API real (HTTPS obligatorio para GitHub Pages)
                const url = `https://gnews.io/api/v4/search?q=tecnologia+sostenibilidad&lang=es&max=12&apikey=${API_KEY}`;
                const response = await fetch(url);
                
                if (!response.ok) throw new Error("Límite de API alcanzado o error de red");

                const data = await response.json();

                if (data.articles && data.articles.length > 0) {
                    renderizar(data.articles, "Análisis IA: Tiempo Real");
                } else {
                    renderizarOffline();
                }
            } catch (error) {
                console.error("Error cargando noticias reales:", error);
                renderizarOffline();
            }
        }

        function renderizar(articulos, tag) {
            container.innerHTML = articulos.map(art => {
                const img = art.image || 'https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=800';
                return `
                    <article class="card">
                        <img src="${img}" class="news-img" alt="Tecnología" onerror="this.src='https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=800'">
                        <div class="card-content">
                            <div>
                                <span class="ia-tag">${tag}</span>
                                <h3>${art.title}</h3>
                            </div>
                            <a href="${art.url}" target="_blank" class="btn-view">LEER REPORTE</a>
                        </div>
                    </article>
                `;
            }).join('');
        }

        function renderizarOffline() {
            // Datos de prueba por si la API falla o llega al límite
            const backupNews = [
                {
                    title: "IA optimiza el consumo energético en infraestructuras urbanas de 2026",
                    url: "https://gnews.io",
                    image: "https://images.unsplash.com/photo-1518770660439-4636190af475?w=800"
                },
                {
                    title: "Avance masivo en la eficiencia de paneles solares transparentes",
                    url: "https://gnews.io",
                    image: "https://images.unsplash.com/photo-1509391366360-2e959784a276?w=800"
                },
                {
                    title: "Reforestación global autónoma: Drones siembran 1M de árboles",
                    url: "https://gnews.io",
                    image: "https://images.unsplash.com/photo-1473960154371-8064101968f2?w=800"
                },
                {
                    title: "Nueva generación de baterías basadas en sodio para vehículos",
                    url: "https://gnews.io",
                    image: "https://images.unsplash.com/photo-1593941707882-a5bba14938c7?w=800"
                }
            ];
            renderizar(backupNews, "Caché de Sistema: Activo");
        }

        // Ejecutar carga al entrar
        window.addEventListener('DOMContentLoaded', cargarNoticias);
    </script>
</body>
</html>
